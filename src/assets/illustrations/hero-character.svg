<!-- Chibi nerdy boy placeholder — original design.
     Cute kawaii proportions: wide rounded head, simple hair cap,
     big oval eyes, triangle nose, small smile.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" fill="none" stroke="currentColor" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- Fade mask for the shirt: white (opaque) at top, black (transparent) at bottom -->
  <defs>
    <!-- Aggressive fade: starts near the neckline and ramps to invisible at the bottom -->
    <linearGradient id="shirtFade" x1="0" y1="280" x2="0" y2="335" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" />
      <stop offset="1" stop-color="black" />
    </linearGradient>
    <mask id="shirtMask">
      <rect x="0" y="0" width="300" height="340" fill="url(#shirtFade)" />
    </mask>
  </defs>

  <!-- FACE: round and wide -->
  <path d="M 60 162
           Q 56 220 98 252
           Q 126 268 150 268
           Q 174 268 202 252
           Q 244 220 240 162" />

  <!-- HAIR: rounded cap with ONE gentle dip in the middle (no M-peaks) -->
  <path d="M 60 162
           Q 50 105 88 72
           Q 118 52 150 50
           Q 182 52 212 72
           Q 250 105 240 162
           Q 228 148 212 140
           Q 196 132 172 130
           Q 150 138 128 130
           Q 104 132 88 140
           Q 72 148 60 162 Z" />

  <!-- Ears: open bumps. Endpoints sit ON the face contour so they read as attached. -->
  <path d="M 60 170 Q 44 192 68 215" />
  <path d="M 240 170 Q 256 192 232 215" />

  <!-- GLASSES -->
  <circle cx="112" cy="172" r="28" />
  <circle cx="188" cy="172" r="28" />
  <path d="M 140 170 Q 150 166 160 170" />

  <!-- EYES: tall ovals -->
  <ellipse cx="112" cy="174" rx="9" ry="12" fill="currentColor" stroke="none" />
  <ellipse cx="188" cy="174" rx="9" ry="12" fill="currentColor" stroke="none" />
  <!-- Highlights -->
  <ellipse cx="108" cy="169" rx="3" ry="2.5" fill="#FFF3E0" stroke="none" />
  <ellipse cx="184" cy="169" rx="3" ry="2.5" fill="#FFF3E0" stroke="none" />

  <!-- TRIANGLE NOSE -->
  <path d="M 144 202 L 156 202 L 150 213 Z" fill="currentColor" stroke="none" />

  <!-- SMALL SMILE -->
  <path d="M 138 230 Q 150 238 162 230" />

  <!-- NECK -->
  <path d="M 130 268 L 130 286" />
  <path d="M 170 268 L 170 286" />

  <!-- Neckline: always fully visible (above the fade zone) -->
  <path d="M 130 286 Q 150 298 170 286" />

  <!-- Shirt sides: single-arc open paths that fade to transparent at the bottom -->
  <g mask="url(#shirtMask)">
    <path d="M 130 286 Q 75 310 48 340" />
    <path d="M 170 286 Q 225 310 252 340" />
  </g>

</svg>
